<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
  <title>VistoriaApp</title>
  <meta name="theme-color" content="#0097A7">
  <meta name="description" content="App de vistorias para engenheiros civis">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="VistoriaApp">
  <meta name="application-name" content="VistoriaApp">
  <meta name="msapplication-TileColor" content="#0097A7">
  <meta name="msapplication-tap-highlight" content="no">
  <meta name="format-detection" content="telephone=no">
  <meta name="apple-touch-fullscreen" content="yes">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <!-- Header com voltar -->
  <header class="app-header">
    <button id="btn-back" class="header-btn hidden" onclick="goBack()">
      &#8592;
    </button>
    <button class="header-home" onclick="goHome()">
      <img src="icons/logo.png" alt="" class="header-logo" onerror="this.style.display='none'">
      <span>VistoriaApp</span>
    </button>
    <span id="offline-badge" class="offline-badge hidden">Offline</span>
  </header>

  <main class="app-main">

    <!-- TELA 1: Projetos -->
    <section id="screen-projetos" class="screen active">
      <div id="lista-projetos" class="card-list"></div>
      <button class="btn btn-primary btn-fab" onclick="showNewProjectForm()">+ Novo Projeto</button>
    </section>

    <!-- Formulario novo projeto (overlay) -->
    <div id="form-projeto-overlay" class="overlay hidden">
      <div class="overlay-card">
        <h3>Novo Projeto</h3>
        <div class="form-group">
          <input type="text" id="input-nome-projeto" placeholder="Nome do projeto (ex: Casa Barao)">
        </div>
        <div class="form-group">
          <input type="text" id="input-endereco-projeto" placeholder="Endereco (opcional)">
        </div>
        <div class="btn-row">
          <button class="btn btn-secondary" onclick="hideOverlay('form-projeto-overlay')">Cancelar</button>
          <button class="btn btn-primary" onclick="createProject()">Criar</button>
        </div>
      </div>
    </div>

    <!-- TELA 2: Ambientes do Projeto -->
    <section id="screen-ambientes" class="screen">
      <div id="projeto-info" class="projeto-header"></div>
      <div id="lista-ambientes" class="card-list"></div>
      <button class="btn btn-primary btn-fab" onclick="showNewAmbienteForm()">+ Novo Ambiente</button>
      <button class="btn btn-accent btn-full" onclick="exportPDF()" style="margin-top:12px">
        Exportar PDF
      </button>
    </section>

    <!-- Formulario novo ambiente (overlay) -->
    <div id="form-ambiente-overlay" class="overlay hidden">
      <div class="overlay-card">
        <h3>Novo Ambiente</h3>
        <div class="form-group">
          <input type="text" id="input-nome-ambiente" placeholder="Ex: Sala, Quarto 1, Banheiro">
        </div>
        <div class="btn-row">
          <button class="btn btn-secondary" onclick="hideOverlay('form-ambiente-overlay')">Cancelar</button>
          <button class="btn btn-primary" onclick="createAmbiente()">Adicionar</button>
        </div>
      </div>
    </div>

    <!-- TELA 3: Fotos do Ambiente -->
    <section id="screen-fotos" class="screen">
      <div id="ambiente-info" class="projeto-header"></div>
      <div id="lista-fotos" class="photo-grid"></div>
      <div class="btn-row">
        <button class="btn btn-outline" onclick="document.getElementById('input-foto').click()">
          Tirar Foto
        </button>
        <button class="btn btn-outline" onclick="document.getElementById('input-foto-galeria').click()">
          Galeria
        </button>
      </div>
      <input type="file" id="input-foto" accept="image/*" capture="environment" hidden>
      <input type="file" id="input-foto-galeria" accept="image/*" multiple hidden>
    </section>

    <!-- TELA 4: Anotacao da Foto -->
    <section id="screen-anotacao" class="screen">
      <div class="anotacao-toolbar">
        <button id="tool-medir" class="tool-btn active" onclick="setTool('medir')">
          Medir
        </button>
        <button id="tool-nota" class="tool-btn" onclick="setTool('nota')">
          Nota
        </button>
        <button id="tool-editar" class="tool-btn tool-edit" onclick="setTool('editar')">
          Editar
        </button>
        <button id="tool-apagar" class="tool-btn tool-danger" onclick="setTool('apagar')">
          Apagar
        </button>
        <button class="btn btn-sm btn-secondary" onclick="deleteCurrentPhoto()">Excluir foto</button>
      </div>
      <div class="canvas-container" id="canvas-container">
        <canvas id="photo-canvas"></canvas>
      </div>
      <p class="canvas-hint" id="canvas-hint">Toque no ponto A para iniciar a medicao</p>
    </section>

    <!-- Popup de medida -->
    <div id="medida-overlay" class="overlay hidden">
      <div class="overlay-card">
        <h3>Medida</h3>
        <div class="form-group">
          <input type="text" id="input-medida" placeholder="Ex: 3,45" inputmode="decimal">
        </div>
        <div class="form-group">
          <label>Unidade</label>
          <div class="unit-selector">
            <button type="button" class="unit-btn" data-unit="mm" onclick="selectUnit('mm')">mm</button>
            <button type="button" class="unit-btn active" data-unit="cm" onclick="selectUnit('cm')">cm</button>
            <button type="button" class="unit-btn" data-unit="m" onclick="selectUnit('m')">m</button>
          </div>
        </div>
        <div class="btn-row">
          <button class="btn btn-secondary" onclick="cancelMedida()">Cancelar</button>
          <button class="btn btn-primary" onclick="confirmMedida()">Ok</button>
        </div>
      </div>
    </div>

    <!-- Popup de nota -->
    <div id="nota-overlay" class="overlay hidden">
      <div class="overlay-card">
        <h3>Nota</h3>
        <div class="form-group">
          <textarea id="input-nota" rows="3" placeholder="Digite sua anotacao..."></textarea>
        </div>
        <div class="btn-row">
          <button class="btn btn-secondary" onclick="cancelNota()">Cancelar</button>
          <button class="btn btn-primary" onclick="confirmNota()">Salvar</button>
        </div>
      </div>
    </div>

    <!-- Popup de renomear -->
    <div id="rename-overlay" class="overlay hidden">
      <div class="overlay-card">
        <h3 id="rename-title">Renomear</h3>
        <div class="form-group">
          <input type="text" id="input-rename" placeholder="Novo nome...">
        </div>
        <div class="btn-row">
          <button class="btn btn-secondary" onclick="hideOverlay('rename-overlay')">Cancelar</button>
          <button class="btn btn-primary" onclick="confirmRename()">Salvar</button>
        </div>
      </div>
    </div>

    <!-- Popup de excluir -->
    <div id="delete-overlay" class="overlay hidden">
      <div class="overlay-card">
        <h3 id="delete-title">Excluir</h3>
        <p id="delete-msg" style="color:var(--text-light);font-size:0.9rem;margin-bottom:16px"></p>
        <div class="btn-row">
          <button class="btn btn-secondary" onclick="hideOverlay('delete-overlay')">Cancelar</button>
          <button class="btn btn-danger" onclick="confirmDelete()">Excluir</button>
        </div>
      </div>
    </div>

    <!-- Loading PDF -->
    <div id="pdf-loading" class="overlay hidden">
      <div class="overlay-card" style="text-align:center">
        <div class="spinner"></div>
        <p style="margin-top:12px">Gerando PDF...</p>
      </div>
    </div>

    <!-- Alert customizado -->
    <div id="alert-overlay" class="overlay hidden">
      <div class="overlay-card">
        <h3 id="alert-title">Aviso</h3>
        <p id="alert-msg" style="color:var(--text-light);font-size:0.9rem;margin-bottom:16px"></p>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="hideOverlay('alert-overlay')">OK</button>
        </div>
      </div>
    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
