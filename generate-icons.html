<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerar Icones - VistoriaApp</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 40px; text-align: center; background: #f1f3f4; }
    h1 { color: #0097A7; }
    canvas { border: 2px solid #ccc; margin: 10px; border-radius: 16px; }
    .row { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin: 20px 0; }
    .col { text-align: center; }
    .col p { font-weight: bold; margin-bottom: 8px; }
    button { 
      display: inline-block; margin: 8px; padding: 12px 24px;
      background: #0097A7; color: white; border: none;
      border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold;
    }
    button:hover { background: #00838F; }
    #upload-area {
      border: 3px dashed #0097A7; border-radius: 16px; padding: 60px 20px;
      margin: 20px auto; max-width: 500px; background: white; cursor: pointer;
    }
    #upload-area:hover { background: #e0f7fa; }
    .success { color: #34a853; font-weight: bold; font-size: 18px; margin: 20px 0; }
  </style>
</head>
<body>
  <h1>Gerar Icones VistoriaApp</h1>
  <p>Clique na area abaixo e selecione o arquivo da logo que voce enviou</p>

  <div id="upload-area" onclick="document.getElementById('file-input').click()">
    &#128193; Clique aqui para selecionar a imagem da logo
  </div>
  <input type="file" id="file-input" accept="image/*" hidden>

  <div class="row" id="previews" style="display:none">
    <div class="col">
      <p>512x512 (Icone PWA)</p>
      <canvas id="c512" width="512" height="512"></canvas>
      <br><button onclick="download('c512','icon-512.png')">Baixar icon-512.png</button>
    </div>
    <div class="col">
      <p>192x192 (Icone PWA)</p>
      <canvas id="c192" width="192" height="192"></canvas>
      <br><button onclick="download('c192','icon-192.png')">Baixar icon-192.png</button>
    </div>
    <div class="col">
      <p>64x64 (Logo no header)</p>
      <canvas id="c64" width="64" height="64"></canvas>
      <br><button onclick="download('c64','logo.png')">Baixar logo.png</button>
    </div>
  </div>

  <div id="msg" class="success" style="display:none">
    Icones gerados! Baixe os 3 arquivos e substitua na pasta icons/ do projeto.
  </div>

  <script>
    document.getElementById('file-input').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        const img = new Image();
        img.onload = function() {
          drawRounded(img, 'c512', 512);
          drawRounded(img, 'c192', 192);
          drawRounded(img, 'c64', 64);
          document.getElementById('previews').style.display = 'flex';
          document.getElementById('msg').style.display = 'block';
          document.getElementById('upload-area').style.display = 'none';
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    function drawRounded(img, canvasId, size) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      const r = size * 0.18;

      ctx.clearRect(0, 0, size, size);

      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(size - r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size - r);
      ctx.quadraticCurveTo(size, size, size - r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.clip();

      const scale = Math.min(size / img.width, size / img.height);
      const w = img.width * scale;
      const h = img.height * scale;
      const x = (size - w) / 2;
      const y = (size - h) / 2;
      ctx.drawImage(img, x, y, w, h);
    }

    function download(canvasId, filename) {
      const canvas = document.getElementById(canvasId);
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
